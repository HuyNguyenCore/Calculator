<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máy Tính</title>
<style>
    body{
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f0f0f0;
    }

    .calculator{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        width:300px;
    }

    #display{
        width:100%;
        height:50px;
        font-size:24px;
        text-align:right;
        margin-bottom:10px;
        padding-right:10px;
        box-sizing:border-box;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:5px;
    }

    button{
        height:50px;
        font-size:20px;
        cursor:pointer;
    }

    #loading{
        display:none;
        text-align:center;
        margin-top:10px;
        color:red;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('/')">÷</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('*')">×</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('-')">−</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="add('+')">+</button>

        <button onclick="clearDisplay()" style="grid-column: span 4;">C</button>
    </div>

    <div id="loading">Đang tính toán siêu cấp AI...</div>
</div>

<script>
function add(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){
    const display = document.getElementById("display");
    const loading = document.getElementById("loading");

    let expression = display.value;

    loading.style.display = "block";
    display.value = "";

    setTimeout(() => {
        try{
            let realResult = eval(expression);

            // Cố tình làm sai
            let wrongResult = realResult + Math.floor(Math.random() * 20) + 1;

            loading.style.display = "none";
            display.value = wrongResult;
        }
        catch{
            loading.style.display = "none";
            display.value = "Lỗi";
        }
    }, 5000);
}
</script>

</body>
</html>
